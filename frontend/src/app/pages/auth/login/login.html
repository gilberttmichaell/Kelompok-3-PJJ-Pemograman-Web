<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo mb-3">
        <i class="fas fa-user-shield"></i>
    </div>
    <h2 class="fw-bold text-primary">Dashboard CRM</h2>
    <p class="text-muted">
        Masuk untuk melanjutkan ke workspace
    </p> </div>
<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" placeholder="Masukkan email">
    </div>
    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="Masukkan password">
    </div>
    <button class="btn btn-primary w-100" type="submit" [disabled]="loginForm.invalid">
        Login
    </button>
</form>
    <a class="register-link" routerLink="/register">Belum punya akun? Daftar</a>
    </div>
</div>
