<div [hidden]="view !== 'list'">
  <div class="container-fluid">
    <h1 class="h3 mb-2 text-gray-800">Contact</h1>
    <p class="mb-4">Kelola seluruh data Contact pada CRM.</p>

    <div class="card shadow mb-4">
      <div class="card-header py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 font-weight-bold text-primary">Daftar Contact</h6>
        <button class="btn btn-primary btn-sm" (click)="showCreate()">
          <i class="fas fa-plus"></i> Tambah Contact
        </button>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table #datatablesSimple id="datatablesSimple" class="table table-bordered table-hover" width="100%" cellspacing="0">
            <thead>
              <tr>
                <th width="70">ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Customer / Perusahaan</th>
                <th>Jabatan (Position)</th>
                <th width="150">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let c of contact">
                <td>{{ c.id }}</td>
                <td>{{ c.name }}</td>
                <td>{{ c.email }}</td>
                <td>{{ c.phone }}</td>
                <td>{{ c.customer_name }}</td>
                <td>{{ c.position }}</td>
                <td>
                  <button class="btn btn-warning btn-sm" data-action="edit" [attr.data-id]="c.id">
                    <i class="fas fa-edit"></i>
                  </button>
                  &nbsp;
                  <button *ngIf="isAdmin" class="btn btn-danger btn-sm" data-action="delete" [attr.data-id]="c.id">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div [hidden]="view !== 'create'">
  <div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Tambah Contact</h1>

    <div class="card shadow mb-4">
      <div class="card-header py-3">
        <h6 class="m-0 font-weight-bold text-primary">Form Tambah Contact</h6>
      </div>
      <div class="card-body">
      <form [formGroup]="createForm" (ngSubmit)="submitCreate()">
        <div class="row">
          
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold text-gray-800 d-block">Nama</label>
            <input type="text" class="form-control" formControlName="name" placeholder="Masukkan nama contact">
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold text-gray-800 d-block">Customer / Perusahaan</label>
            <select class="form-control form-select" formControlName="customer_id">
              <option [ngValue]="null" disabled selected>-- Pilih Customer --</option>
              <option *ngFor="let cust of customers" [ngValue]="cust.id">
                {{ cust.name }}
              </option>
            </select>
          </div>

        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold text-gray-800 d-block">Email</label>
            <input type="email" class="form-control" formControlName="email" placeholder="contoh@mail.com">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold text-gray-800 d-block">Phone</label>
            <input type="text" class="form-control" formControlName="phone" placeholder="0812xxxxx">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label font-weight-bold text-gray-800 d-block">Jabatan (Position)</label>
          <input type="text" class="form-control" formControlName="position" placeholder="Contoh: Manager, Staff">
        </div>
        
        <button class="btn btn-primary" type="submit" [disabled]="isSaving">
          <i class="fas fa-save"></i>
          {{ isSaving ? 'Menyimpan...' : 'Simpan' }}
        </button>
        <button type="button" class="btn btn-secondary ms-2" (click)="backToList()">
          <i class="fas fa-arrow-left"></i> Kembali
        </button>
      </form>
      </div>
    </div>
  </div>
</div>

<div [hidden]="view !== 'edit'">
  <div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Edit Contact</h1>

    <div class="card shadow mb-4">
      <div class="card-header py-3">
        <h6 class="m-0 font-weight-bold text-warning">Form Edit Contact</h6>
      </div>
      <div class="card-body">
        <form [formGroup]="editForm" (ngSubmit)="submitUpdate()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label>Nama</label>
              <input class="form-control" formControlName="name">
            </div>
            <div class="col-md-6 mb-3">
              <label>Customer / Perusahaan</label>
              <select class="form-select" formControlName="customer_id">
                <option [ngValue]="null" disabled>-- Pilih Customer --</option>
                <option *ngFor="let cust of customers" [ngValue]="cust.id">
                  {{ cust.name }}
                </option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label>Email</label>
              <input type="email" class="form-control" formControlName="email">
            </div>
            <div class="col-md-6 mb-3">
              <label>Phone</label>
              <input class="form-control" formControlName="phone">
            </div>
          </div>

          <div class="mb-3">
            <label>Jabatan (Position)</label>
            <input type="text" class="form-control" formControlName="position">
          </div>

          <button class="btn btn-warning" type="submit" [disabled]="isSaving">
            <i class="fas fa-save"></i>
            {{ isSaving ? 'Update...' : 'Update Contact' }}
          </button>
          <button type="button" class="btn btn-secondary ms-2" (click)="backToList()">
            <i class="fas fa-arrow-left"></i> Kembali
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
