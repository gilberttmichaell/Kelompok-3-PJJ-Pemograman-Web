<div class="container">

  <h2>Lead List</h2>

  <table class="table table-bordered">

    <thead>
      <tr>
        <th>Customer ID</th>
        <th>Title</th>
        <th>Source</th>
        <th>Notes</th>
        <th>Status</th>
        <th>Assigned To</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let l of leads">

        <td>{{ l.customer_id }}</td>
        <td>{{ l.title }}</td>
        <td>{{ l.source }}</td>
        <td>{{ l.notes }}</td>
        <td>{{ l.status }}</td>
        <td>{{ l.assigned_to }}</td>

      </tr>

    </tbody>

  </table>

</div>
